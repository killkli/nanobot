site_name: Nanobot
site_description: Ultra-lightweight personal AI assistant framework supporting 16+ chat platforms
site_url: https://nanobot.dev
repo_url: https://github.com/HKUDS/nanobot
repo_name: nanobot
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

not_in_nav: |
  CHANNEL_PLUGIN_GUIDE.md

plugins:
  - search:
      lang:
        - en
  - minify:
      minify_html: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HKUDS/nanobot
  version:
    provider: mike
  analytics:
    provider: google

extra_css:
  - assets/extra.css

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
      - Onboarding: getting-started/onboarding.md
  - Channels:
      - channels/index.md
      - Telegram: channels/telegram.md
      - Discord: channels/discord.md
      - Slack: channels/slack.md
      - Feishu: channels/feishu.md
      - DingTalk: channels/dingtalk.md
      - WeCom: channels/wecom.md
      - Weixin / WeChat: channels/weixin.md
      - QQ: channels/qq.md
      - Email: channels/email.md
      - Matrix: channels/matrix.md
      - WhatsApp: channels/whatsapp.md
      - Mochat: channels/mochat.md
  - LLM Providers:
      - providers/index.md
      - OpenRouter: providers/openrouter.md
      - Anthropic: providers/anthropic.md
      - OpenAI: providers/openai.md
      - Other Providers: providers/others.md
      - Local Models: providers/local.md
      - OpenVINO Model Server: providers/openvino.md
  - Configuration Reference:
      - configuration/index.md
      - Full Configuration Reference: configuration/reference.md
      - Multi-instance Configuration: configuration/multi-instance.md
  - Tools & Skills:
      - tools-skills/index.md
      - Built-in Tools: tools-skills/tools.md
      - Skills System: tools-skills/skills.md
      - MCP Integration: tools-skills/mcp.md
  - Deployment:
      - deployment/index.md
      - Gateway Service: deployment/gateway.md
      - Docker: deployment/docker.md
      - Linux Service: deployment/linux-service.md
  - Development:
      - development/index.md
      - Architecture: development/architecture.md
      - Contributing Guide: development/contributing.md
      - Channel Plugin Development: development/channel-plugin.md
  - Release Notes:
      - v0.1.4.post6: news/0.1.4.post6.md
  - CLI Reference: cli-reference.md
